<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>RPG</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: #eee;
  display: flex;
  height: 100vh;
}

#stats, #menu {
  width: 250px;
  background: #1a1a1a;
  padding: 15px;
}

#stats { border-right: 2px solid #333; }
#menu { border-left: 2px solid #333; }

#main {
  flex: 1;
  padding: 20px;
  text-align: center;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  background: #333;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover { background: #555; }

.role { cursor:pointer; }

#charInfo { text-align: center; margin-top: 10px; }
#charName { font-size: 18px; font-weight: bold; }
#charRole { font-size: 14px; color: #aaa; }
#charLevel { font-size: 13px; color: #888; }

#xpContainer {
  width: 100%;
  height: 12px;
  background: #333;
  margin-top: 10px;
  border-radius: 5px;
  overflow: hidden;
}

#xpBar {
  height: 100%;
  width: 0%;
  background: limegreen;
}

#xpText {
  font-size: 12px;
  color: #aaa;
  text-align: center;
  margin-top: 3px;
}
</style>
</head>

<body>

<div id="stats" style="display:none;">
  <img id="avatar" src="assets/characters/warrior.png" style="width:100%">

  <div id="charInfo">
    <div id="charName">---</div>
    <div id="charRole">---</div>
    <div id="charLevel">level 1</div>

    <div id="xpContainer">
      <div id="xpBar"></div>
    </div>
    <div id="xpText">0 / 100</div>
  </div>
</div>

<div id="main">
  <h2>Login / Register</h2>

  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br>

  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>
</div>

<div id="menu" style="display:none;">
  <button onclick="openMenu('character')">character</button>
  <button onclick="openMenu('inventory')">inventory</button>

  <!-- TEST XP -->
  <button onclick="addXP(50)">+50 XP</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBiT3zelFo_R-AVhWWiP6xQI9jt1JzE3h0",
  authDomain: "noxerion-rpg.firebaseapp.com",
  projectId: "noxerion-rpg"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let player = {};

// XP LOGIKA
function getRequiredXP(level) {
  return Math.floor(100 * Math.pow(level, 1.5));
}

window.addXP = async function(amount) {
  player.xp += amount;

  let required = getRequiredXP(player.level);

  while (player.xp >= required) {
    player.xp -= required;
    player.level++;
    required = getRequiredXP(player.level);
  }

  updateUI();
  await savePlayer();
}

// SAVE
async function savePlayer() {
  const user = auth.currentUser;
  if (!user) return;

  await setDoc(doc(db, "players", user.uid), player);
}

// REGISTER
window.register = function() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => showRoles())
    .catch(e => alert(e.message));
}

// LOGIN
window.login = function() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(async (userCredential) => {

      const docSnap = await getDoc(doc(db, "players", userCredential.user.uid));

      if (docSnap.exists()) {
        player = docSnap.data();
        startGame();
      } else {
        showRoles();
      }

    })
    .catch(() => alert("Hibás adat"));
}

// ROLE
window.showRoles = function() {
  document.getElementById("main").innerHTML = `
    <h2>Válassz kasztot</h2>
    <div style="display:flex; justify-content:center; gap:40px;">
      <div class="role" onclick="selectRole('warrior')">
        <img src="assets/characters/warrior.png" width="120"><br>Warrior
      </div>
      <div class="role" onclick="selectRole('mage')">
        <img src="assets/characters/mage.png" width="120"><br>Mage
      </div>
      <div class="role" onclick="selectRole('rogue')">
        <img src="assets/characters/rogue.png" width="120"><br>Rogue
      </div>
    </div>
  `;
}

window.selectRole = function(role) {
  player.role = role;

  document.getElementById("main").innerHTML = `
    <input id="name" placeholder="Karakter név"><br><br>
    <button onclick="finishRegister()">Start</button>
  `;
}

window.finishRegister = async function() {
  player.name = document.getElementById("name").value;
  player.level = 1;
  player.xp = 0;

  await savePlayer();
  startGame();
}

// GAME
function startGame() {

  document.getElementById("main").innerHTML =
    "<h2>Üdv " + player.name + "</h2>";

  document.getElementById("avatar").src =
    "assets/characters/" + player.role + ".png";

  document.getElementById("menu").style.display = "block";
  document.getElementById("stats").style.display = "block";

  updateUI();
}

// UI
function updateUI() {
  document.getElementById("charName").innerText = player.name;
  document.getElementById("charRole").innerText = player.role;
  document.getElementById("charLevel").innerText = "level " + player.level;

  const required = getRequiredXP(player.level);
  const percent = (player.xp / required) * 100;

  document.getElementById("xpBar").style.width = percent + "%";
  document.getElementById("xpText").innerText =
    player.xp + " / " + required;
}

window.openMenu = function(type){
  document.getElementById("main").innerHTML = "<h2>"+type+"</h2>";
}

</script>

</body>
</html>
