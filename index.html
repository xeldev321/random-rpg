<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>RPG</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: #eee;
  display: flex;
  height: 100vh;
}

#stats, #menu {
  width: 250px;
  background: #1a1a1a;
  padding: 15px;
}

#stats { border-right: 2px solid #333; }
#menu { border-left: 2px solid #333; }

#main {
  flex: 1;
  padding: 20px;
  text-align: center;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  background: #333;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover { background: #555; }

.role { cursor:pointer; }
</style>
</head>

<body>

<!-- BAL -->
<div id="stats" style="display:none;">
  <img id="avatar" src="assets/characters/warrior.png" style="width:100%">
  <h3>[---/---/1]</h3>
</div>

<!-- KÖZÉP -->
<div id="main">
  <h2>Login / Register</h2>

  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br>

  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>
</div>

<!-- JOBB -->
<div id="menu" style="display:none;">
  <button onclick="openMenu('character')">character</button>
  <button onclick="openMenu('inventory')">inventory</button>
</div>

<!-- 🔥 EGYETLEN SCRIPT -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔑 Firebase config (a tiéd marad!)
const firebaseConfig = {
  apiKey: "AIzaSyBiT3zelFo_R-AVhWWiP6xQI9jt1JzE3h0",
  authDomain: "noxerion-rpg.firebaseapp.com",
  projectId: "noxerion-rpg"
};

// 🔌 1. app létrehozás
const app = initializeApp(firebaseConfig);

// 🔐 2. auth
const auth = getAuth(app);

// 🧠 3. adatbázis
const db = getFirestore(app);

let player = {};

// REGISTER
window.register = function() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
      showRoles();
    })
    .catch(e => alert(e.message));
}

// LOGIN
window.login = function() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(async (userCredential) => {

      const user = userCredential.user;

      const docRef = doc(db, "players", user.uid);
      const docSnap = await getDoc(docRef);

      if (docSnap.exists()) {
        player = docSnap.data();
        startGame();
      } else {
        showRoles();
      }

    })
    .catch(() => alert("Hibás adat"));
}

// ROLE
window.showRoles = function() {
  document.getElementById("main").innerHTML = `
    <h2>Válassz kasztot</h2>

    <div style="display:flex; justify-content:center; gap:40px;">
      <div class="role" onclick="selectRole('warrior')">
        <img src="assets/characters/warrior.png" width="120"><br>Warrior
      </div>
      <div class="role" onclick="selectRole('mage')">
        <img src="assets/characters/mage.png" width="120"><br>Mage
      </div>
      <div class="role" onclick="selectRole('rogue')">
        <img src="assets/characters/rogue.png" width="120"><br>Rogue
      </div>
    </div>
  `;
}

window.selectRole = function(role) {
  player.role = role;

  document.getElementById("main").innerHTML = `
    <input id="name" placeholder="Karakter név"><br><br>
    <button onclick="finishRegister()">Start</button>
  `;
}

window.finishRegister = async function() {
  player.name = document.getElementById("name").value;

  const user = auth.currentUser;

  await setDoc(doc(db, "players", user.uid), {
    name: player.name,
    role: player.role
  });

  startGame();
}

// GAME
function startGame() {
  document.getElementById("main").innerHTML =
    "<h2>Üdv " + (player.name || "Player") + "</h2>";

  if(player.role){
    document.getElementById("avatar").src =
      "assets/characters/" + player.role + ".png";
  }

  document.getElementById("menu").style.display = "block";
  document.getElementById("stats").style.display = "block";
}

window.openMenu = function(type){
  document.getElementById("main").innerHTML = "<h2>"+type+"</h2>";
}

</script>

</body>
</html>
