<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Browser RPG</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: #eee;
  display: flex;
  height: 100vh;
}

/* BAL PANEL – STATOK */
#stats {
  width: 250px;
  background: #1a1a1a;
  padding: 15px;
  border-right: 2px solid #333;
}

/* KÖZÉP – JÁTÉKTÉR (placeholder) */
#main {
  flex: 1;
  padding: 20px;
}

/* JOBB PANEL – NAV */
#menu {
  width: 250px;
  background: #1a1a1a;
  padding: 15px;
  border-left: 2px solid #333;
}

/* STAT BLOKK */
.stat {
  margin-bottom: 8px;
}

/* GOMBOK */
button {
  width: 100%;
  margin-bottom: 8px;
  padding: 10px;
  background: #333;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #555;
}
</style>
</head>

<body>

<!-- STAT PANEL -->
<div id="stats">
  <img id="avatar" src="assets/characters/warrior.png" style="width:100%; margin-bottom:10px;">
  <h3>[Gertrude/Warrior/1]</h3>

  <div class="stat">XP: 10/100</div>
  <div class="stat">RP: 5</div>
  <div class="stat">HP: 20/60</div>
  <div class="stat">EN: 15/40</div>

  <hr>

  <div class="stat">ST: 5</div>
  <div class="stat">DX: 4</div>
  <div class="stat">AG: 3</div>
  <div class="stat">KN: 2</div>
  <div class="stat">CR: 1%</div>
</div>

<!-- MAIN -->
<div id="main">
  <h2>Login / Register</h2>
  
  <input id="username" placeholder="Username"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>

  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>
</div>

<script>

let player = null;

// AUTO LOGIN
window.onload = () => {
  let saved = localStorage.getItem("player");
  if (saved) {
    player = JSON.parse(saved);
    startGame();
  }
};

function register() {
  let username = document.getElementById("username").value;
  let password = document.getElementById("password").value;

  if (!username || !password) {
    alert("Tölts ki mindent");
    return;
  }

  player = {
    username,
    password,
    role: null,
    name: null
  };

  showRoleSelection();
}

function login() {
  let saved = JSON.parse(localStorage.getItem("player"));

  if (!saved) {
    alert("Nincs regisztrált user");
    return;
  }

  let username = document.getElementById("username").value;
  let password = document.getElementById("password").value;

  if (username === saved.username && password === saved.password) {
    player = saved;
    startGame();
  } else {
    alert("Hibás adatok");
  }
}

function showRoleSelection() {
  document.getElementById("main").innerHTML = `
    <h2>Válassz kasztot</h2>

    <img src="assets/characters/warrior.png" onclick="selectRole('warrior')" width="100">
    <img src="assets/characters/mage.png" onclick="selectRole('mage')" width="100">
    <img src="assets/characters/rogue.png" onclick="selectRole('rogue')" width="100">
  `;
}

function selectRole(role) {
  player.role = role;

  document.getElementById("main").innerHTML = `
    <h2>Karakter név</h2>
    <input id="charName" placeholder="Name">
    <button onclick="finishRegister()">Start</button>
  `;
}

function finishRegister() {
  let name = document.getElementById("charName").value;

  if (!name) {
    alert("Adj meg nevet");
    return;
  }

  player.name = name;

  localStorage.setItem("player", JSON.stringify(player));

  startGame();
}

function startGame() {
  document.getElementById("main").innerHTML =
    "<h2>Üdv, " + player.name + "!</h2>";

  document.querySelector("#stats h3").innerText =
    "[" + player.name + "/" + player.role + "/1]";
}

</script>
